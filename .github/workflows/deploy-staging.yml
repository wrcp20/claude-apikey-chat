name: Deploy Staging

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy en Staging
    runs-on: [self-hosted, wsl]
    environment: staging
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      MSYS_NO_PATHCONV: 1
      MSYS2_ARG_CONV_EXCL: "*"

    steps:
      - name: Actualizar código
        run: |
          cd ${{ vars.DEPLOY_PATH }}
          git pull origin main

      - name: Rebuild y restart Docker
        run: |
          cd ${{ vars.DEPLOY_PATH }}
          docker compose up --build -d

      - name: Verificar que responde
        run: |
          sleep 5
          curl -sf http://localhost:${{ vars.DEPLOY_PORT }}/health || exit 1

      - name: Deploy completado
        run: |
          echo "✓ Staging listo para QA"
          curl -s http://localhost:${{ vars.DEPLOY_PORT }}/api/status
