name: Deploy Staging

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy en Staging
    runs-on: [self-hosted, wsl]
    environment: staging
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
      HOST_PORT: ${{ vars.DEPLOY_PORT }}

    steps:
      - name: Actualizar código
        run: |
          cd "$DEPLOY_PATH"
          git pull origin main

      - name: Rebuild y restart Docker
        run: |
          cd "$DEPLOY_PATH"
          docker compose down
          # NOTA: docker-compose.yml usa container_name hardcodeado "claude-apikey-backend".
          # Esto causa conflicto cuando existe un contenedor previo de otro contexto
          # (ej: produccion corriendo en el mismo host, o un run anterior fallido).
          # TODO: Limpiar esto usando container_name dinamico con variable de entorno:
          #   container_name: claude-apikey-backend-${COMPOSE_PROJECT_NAME:-production}
          # y agregando COMPOSE_PROJECT_NAME=staging en el .env de cada ambiente.
          # Por ahora se fuerza la remocion del contenedor conflictivo.
          docker rm -f claude-apikey-backend 2>/dev/null || true
          docker compose up --build -d

      - name: Verificar que responde
        run: |
          sleep 5
          curl -sf "http://localhost:${DEPLOY_PORT}/health" || exit 1

      - name: Deploy completado
        run: |
          echo "✓ Staging listo para QA"
          curl -s "http://localhost:${DEPLOY_PORT}/api/status"
